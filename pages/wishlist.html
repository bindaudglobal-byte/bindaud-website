  <link rel="icon" href="../assets/Favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="../assets/Favicon/favicon.svg">
  <link rel="apple-touch-icon" href="../assets/Favicon/apple-touch-icon.png">
  <link rel="manifest" href="../assets/Favicon/site.webmanifest">
  <meta name="theme-color" content="#21486B">

  <link rel="stylesheet" href="../css/style.css">

<body class="bd-body">

    <div class="container header-inner">
      <a href="../index.html" class="brand">
        <img src="../assets/logo/logo.png" alt="BIN DAUD" width="55">
        <span class="brand-name">BIN DAUD</span>
      </a>

      <div class="header-search">
        <input type="search" class="site-search" placeholder="Search products..." aria-label="Search products">
      </div>

      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
      <label for="nav-toggle" class="hamburger-icon" aria-hidden="true">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </label>

      <nav class="primary-nav">
        <ul class="nav-list">
          <li><a href="../index.html" class="nav-link">Home</a></li>
          <li><a href="shop.html" class="nav-link">Shop</a></li>
          <li><a href="cart.html" class="nav-link">Cart <span id="cart-count" class="cart-count-badge">0</span></a></li>

          <li><a href="contact.html" class="nav-link">Contact</a></li>

        <h1 class="section-title text-center">Your Wishlist</h1>

        <div id="wishlist-shell" class="wishlist-shell">

        </div>

    </section>

      <div class="footer-col">
        <h3 class="footer-title">BIN DAUD</h3>
        <p class="footer-desc">Premium streetwear brand inspired by Japanese culture and modern luxury.</p>
      </div>
    </div>
  </footer>

  <script src="../js/config.js"></script>
  <script type="module">
    import { initSite } from '../js/cart.js';
    import { renderWishlistPage } from '../js/wishlist.js';

    document.addEventListener('DOMContentLoaded', () => {
      initSite();
      const shell = document.getElementById('wishlist-shell');
      renderWishlistPage(shell);
    });

<script src="../js/config.js"></script>
<script type="module" src="../js/app.js"></script>
